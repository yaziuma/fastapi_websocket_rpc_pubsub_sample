<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ node_name }} UI</title>
  <style>
    :root {
      --bg: #f6f2ea;
      --panel: #fffdf9;
      --line: #d8ccba;
      --text: #221d17;
      --muted: #6c6257;
      --accent: #0f766e;
      --accent2: #c2410c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.10), transparent 24rem),
        radial-gradient(circle at top right, rgba(194,65,12,0.10), transparent 24rem),
        var(--bg);
    }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(34,29,23,0.06);
    }
    h1, h2, h3 { margin-top: 0; }
    p { color: var(--muted); }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .triple {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, select, button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font: inherit;
      background: #fff;
      color: var(--text);
    }
    button {
      border: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #0ea5a4);
      cursor: pointer;
      font-weight: 700;
    }
    button.alt {
      background: linear-gradient(135deg, var(--accent2), #ea580c);
    }
    button.ghost {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
    }
    .actions {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 12px;
    }
    pre {
      margin: 0;
      min-height: 180px;
      padding: 14px;
      border-radius: 14px;
      background: #1d1916;
      color: #f7f3ec;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
    }
    .tiny { font-size: 12px; color: var(--muted); }
    @media (max-width: 960px) {
      .grid, .triple, .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <h1>{{ node_name }} Dashboard</h1>
      <p>登録、相互登録、相互解除、相手サーバのジョブ操作、相手 callback 側のアラート操作、PubSub 配信、ローカル/リモート状態確認を 1 画面で行います。</p>
      <p class="tiny">Local: {{ local_base_url }} / <a href="/docs">/docs</a></p>
    </section>

    <section class="panel">
      <h2>接続設定</h2>
      <div class="triple">
        <div>
          <label for="remoteName">Remote Name</label>
          <input id="remoteName" value="{{ default_remote_name }}">
        </div>
        <div>
          <label for="remoteBaseUrl">Remote Base URL</label>
          <input id="remoteBaseUrl" value="{{ default_remote_base_url }}">
        </div>
        <div>
          <label for="target">Target</label>
          <select id="target">
            <option value="all" selected>all</option>
            <option value="rpc">rpc</option>
            <option value="pubsub">pubsub</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button id="connectBtn">登録開始</button>
        <button id="connectMutualBtn" class="alt">相互登録</button>
        <button id="disconnectBtn" class="ghost">登録解除</button>
        <button id="disconnectMutualBtn" class="ghost">相互解除</button>
      </div>
    </section>

    <div class="grid">
      <section class="panel">
        <h2>操作</h2>
        <div class="triple">
          <div>
            <label for="rpcTargetType">RPC 公開種別</label>
            <select id="rpcTargetType">
              <option value="server" selected>server methods</option>
              <option value="client">client methods</option>
            </select>
          </div>
          <div>
            <label for="rpcMethod">RPC Method</label>
            <select id="rpcMethod"></select>
          </div>
          <div>
            <label for="rpcMessage">RPC 送信メッセージ</label>
            <input id="rpcMessage" value="hello from UI">
          </div>
        </div>
        <p class="tiny" id="rpcMethodSummary">ここに選択中 method の説明を表示します。</p>
        <div class="actions">
          <button id="rpcInvokeBtn">選択した RPC method を実行</button>
          <button id="rpcMethodsBtn" class="ghost">公開 method 一覧を表示</button>
        </div>
        <label for="topic" style="margin-top:12px;">PubSub Topic</label>
        <input id="topic" value="events">
        <label for="pubsubMessage" style="margin-top:12px;">PubSub Message</label>
        <input id="pubsubMessage" value="event from UI">
        <div class="actions">
          <button id="publishBtn">Publish</button>
          <button id="localEventsBtn" class="ghost">Local Events</button>
          <button id="remoteSnapshotBtn" class="ghost">Remote Snapshot</button>
        </div>
      </section>

      <section class="panel">
        <h2>API Response</h2>
        <div class="actions">
          <button id="copyResultBtn" class="ghost">レスポンスをコピー</button>
        </div>
        <pre id="resultBox">ここに API 応答を表示します。</pre>
      </section>
    </div>

    <div class="grid">
      <section class="panel">
        <h2>Local</h2>
        <div class="actions">
          <button id="localHealthBtn" class="ghost">Health</button>
        </div>
        <pre id="localBox">{}</pre>
      </section>

      <section class="panel">
        <h2>Remote</h2>
        <div class="actions">
          <button id="remoteHealthBtn" class="ghost">Health + Events</button>
        </div>
        <pre id="remoteBox">{}</pre>
      </section>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const pretty = (value) => JSON.stringify(value, null, 2);
    const rpcCatalog = {{ rpc_catalog | tojson }};

    function settings() {
      const remoteBaseUrl = $("remoteBaseUrl").value.trim().replace(/\/$/, "");
      return {
        target: $("target").value,
        remote_name: $("remoteName").value.trim(),
        remote_base_url: remoteBaseUrl,
        rpc_url: remoteBaseUrl.replace(/^http/, "ws") + "/ws/rpc",
        pubsub_url: remoteBaseUrl.replace(/^http/, "ws") + "/ws/pubsub",
        rpc_message: $("rpcMessage").value,
        topic: $("topic").value,
        pubsub_message: $("pubsubMessage").value
      };
    }

    function updateRpcMethodOptions() {
      const targetType = $("rpcTargetType").value;
      const methods = rpcCatalog[targetType] || [];
      const methodSelect = $("rpcMethod");
      methodSelect.innerHTML = "";
      for (const method of methods) {
        const option = document.createElement("option");
        option.value = method.name;
        option.textContent = method.name;
        methodSelect.appendChild(option);
      }
      updateRpcMethodSummary();
    }

    function updateRpcMethodSummary() {
      const targetType = $("rpcTargetType").value;
      const methodName = $("rpcMethod").value;
      const methods = rpcCatalog[targetType] || [];
      const selected = methods.find((item) => item.name === methodName);
      const messageInput = $("rpcMessage");
      const summary = $("rpcMethodSummary");
      if (!selected) {
        messageInput.disabled = false;
        summary.textContent = "選択中 method の情報がありません。";
        return;
      }
      messageInput.disabled = !selected.ui_message_field;
      const params = selected.params.length ? selected.params.join(", ") : "なし";
      summary.textContent = `${targetType} / ${selected.name}: ${selected.summary} 引数: ${params}`;
    }

    async function callJson(path, payload, targetBox = "resultBox") {
      const response = await fetch(path, {
        method: payload ? "POST" : "GET",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: payload ? JSON.stringify(payload) : undefined
      });
      const data = await response.json();
      $(targetBox).textContent = pretty({ status: response.status, data });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return data;
    }

    async function refreshLocal() {
      await callJson("/health", null, "localBox");
    }

    async function refreshRemote() {
      const s = settings();
      await callJson("/ui/remote-snapshot", { remote_base_url: s.remote_base_url }, "remoteBox");
    }

    $("connectBtn").onclick = async () => {
      const s = settings();
      await callJson("/registration/connect", {
        target: s.target,
        remote_name: s.remote_name,
        rpc_url: s.rpc_url,
        pubsub_url: s.pubsub_url
      });
      await refreshLocal();
    };

    $("connectMutualBtn").onclick = async () => {
      const s = settings();
      await callJson("/registration/connect-mutual", {
        target: s.target,
        remote_name: s.remote_name,
        remote_base_url: s.remote_base_url
      });
      await refreshLocal();
      await refreshRemote();
    };

    $("disconnectBtn").onclick = async () => {
      const s = settings();
      await callJson("/registration/disconnect", { target: s.target });
      await refreshLocal();
    };

    $("disconnectMutualBtn").onclick = async () => {
      const s = settings();
      await callJson("/registration/disconnect-mutual", {
        target: s.target,
        remote_base_url: s.remote_base_url
      });
      await refreshLocal();
      await refreshRemote();
    };

    $("rpcInvokeBtn").onclick = async () => {
      const s = settings();
      const targetType = $("rpcTargetType").value;
      const method = $("rpcMethod").value;
      if (targetType === "server" && method === "get_node_info") {
        await callJson("/rpc/server/get-node-info", {});
        await refreshLocal();
        await refreshRemote();
        return;
      }
      if (targetType === "server" && method === "submit_job") {
        await callJson("/rpc/server/submit-job", { message: s.rpc_message });
        await refreshLocal();
        await refreshRemote();
        return;
      }
      if (targetType === "server" && method === "list_jobs") {
        await callJson("/rpc/server/list-jobs", {});
        await refreshLocal();
        await refreshRemote();
        return;
      }
      if (targetType === "client" && method === "push_alert") {
        await callJson("/rpc/client/push-alert", { message: s.rpc_message });
        await refreshLocal();
        await refreshRemote();
        return;
      }
      if (targetType === "client" && method === "list_alerts") {
        await callJson("/rpc/client/list-alerts", {});
        await refreshLocal();
        await refreshRemote();
        return;
      }
      if (targetType === "client" && method === "client_status") {
        await callJson("/rpc/client/status", {});
        await refreshLocal();
        await refreshRemote();
        return;
      }
      $("resultBox").textContent = pretty({
        status: 400,
        data: {
          error: "UI がこの method に対応していません",
          targetType,
          method
        }
      });
    };

    $("rpcMethodsBtn").onclick = async () => {
      await callJson("/rpc/methods");
    };

    $("publishBtn").onclick = async () => {
      const s = settings();
      await callJson("/pubsub/publish", { topic: s.topic, message: s.pubsub_message });
      await refreshRemote();
    };

    $("localEventsBtn").onclick = async () => {
      await callJson("/pubsub/events");
    };

    $("remoteSnapshotBtn").onclick = async () => {
      await refreshRemote();
    };

    $("localHealthBtn").onclick = async () => {
      await refreshLocal();
    };

    $("remoteHealthBtn").onclick = async () => {
      await refreshRemote();
    };

    $("copyResultBtn").onclick = async () => {
      const content = $("resultBox").textContent;
      const button = $("copyResultBtn");
      const originalText = "レスポンスをコピー";
      try {
        await navigator.clipboard.writeText(content);
        button.textContent = "コピーしました";
      } catch (error) {
        button.textContent = "コピー失敗";
      }
      setTimeout(() => {
        button.textContent = originalText;
      }, 1500);
    };

    $("rpcTargetType").onchange = updateRpcMethodOptions;
    $("rpcMethod").onchange = updateRpcMethodSummary;

    updateRpcMethodOptions();
    refreshLocal();
  </script>
</body>
</html>
